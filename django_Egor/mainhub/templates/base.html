{% load static %}
<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Базовый шаблон{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
      header{background:#333;color:#fff;padding:0.75rem 1rem}
      .header-row{display:flex;justify-content:space-between;align-items:center}
      .auth-links a{margin-left:0.5rem;color:#fff;text-decoration:none}
    </style>
</head>

<body>
    <header>
        <div class="header-row">
          <h1>Мой сайт</h1>
          <div class="auth-links">
            {% if user.is_authenticated %}
              <span class="username">{{ user.username }}</span>
              <a href="{% url 'logout' %}" class="btn btn-outline">Выйти</a>
            {% else %}
              <a href="{% url 'signup' %}" class="btn btn-outline">Регистрация</a>
              <a href="{% url 'login' %}" class="btn btn-primary">Войти</a>
            {% endif %}
          </div>
        </div>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        © 2025 Мой сайт
    </footer>
</body>

</html>
