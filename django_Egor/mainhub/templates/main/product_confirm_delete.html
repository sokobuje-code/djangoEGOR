{% extends 'base.html' %}

{% block title %}Подтвердите удаление{% endblock %}

{% block content %}
<h2>Удалить {{ product.name }}?</h2>
<form method="post">
    {% csrf_token %}
    <button type="submit">Да, удалить</button>
    <a href="{% url 'product_detail' product.pk %}">Отмена</a>
 </form>
{% endblock %}
